<!DOCTYPE html>
<html lang="bs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dnevna pitalica - Druga osnovna škola, Hrasnica</title>
        <link rel="stylesheet" href="/global_style.css" />
        <style>
            h1 {
                font-size: 36pt;
                font-weight: bold;
                color: rgb(225, 225, 225)
            }
            form {
                opacity: 0;
                animation: 0.5s fadein 0s forwards
            }
            label {
                display: block;
                margin: 24pt;
                font-size: 24pt;
                color: rgb(225, 225, 225)
            }
            button {
                width: 240pt;
                height: 60pt;
                margin: 12pt;
                border: none;
                border-radius: 12pt;
                background-color: rgb(125, 125, 125);
                font-size: 18pt;
                font-family: "Trebuchet MS", "Segoe UI (Local)", sans-serif;
                color: rgb(225, 225, 225);
                animation: 0.25s idle 0s forwards
            }
            button:hover {
                animation: 0.25s hover 0s forwards
            }
            #bg {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                opacity: 50%;
                z-index: -1
            }
            #start, #restart {
                width: 120pt;
                height: 120pt;
                margin: 24pt;
                background-color: rgb(125, 125, 125);
                font-size: 72pt;
                font-family: "Segoe UI (Local)", sans-serif;
                color: rgb(225, 225, 225)
            }
            #display {
                font-size: 72pt;
                animation: 0.5s fadein 0s forwards
            }
            @keyframes fadein {
                from {
                    opacity: 0
                }
                to {
                    opacity: 1
                }
            }
            @keyframes fadeout {
                from {
                    opacity: 1
                }
                to {
                    opacity: 0
                }
            }
            @keyframes idle {
                from {
                    background-color: rgb(125, 125, 125)
                }
                to {
                    background-color: rgb(95, 95, 95)
                }
            }
            @keyframes hover {
                from {
                    background-color: rgb(95, 95, 95)
                }
                to {
                    background-color: rgb(125, 125, 125)
                }
            }
            @keyframes correct {
                from {
                    background-color: rgb(125, 125, 125)
                }
                to {
                    background-color: rgb(63, 192, 63);
                }
            }
            @keyframes wrong {
                from {
                    background-color: rgb(125, 125, 125)
                }
                to {
                    background-color: rgb(192, 63, 63);
                }
            }
        </style>
    </head>
    <body>
        <div id="bg"></div>
        <h1 class="u"></h1>
        <button class="u" id="start">▶</button>
        <footer class="u">© 2024 Omer Drkić. All Rights Reserved.</footer>
        <script>
            function crash() { location.href = "/unavailable" }
            fetch("/data.json")
                .then(res => res.json())
                .then(temp => { sessionStorage.setItem("data", JSON.stringify(temp)) })
                .catch(error => { location.reload() })
            let date = new Date()
            let data = JSON.parse(sessionStorage.getItem("data"))
            if (data === null) location.reload()
            else if (
                !data.hasOwnProperty((date.getMonth() + 1).toString())
                ||
                !data[(date.getMonth() + 1).toString()].hasOwnProperty(date.getDate().toString())
            ) crash()
            let today = data[(date.getMonth() + 1).toString()][date.getDate().toString()]
            let questions = today.questions
            var score = 0
            var answer
            const start = document.getElementById("start")
            function ask(question) {
                return new Promise((resolve) => {
                    form = document.createElement("form")
                    label = document.createElement("label")
                    br = document.createElement("br")
                    button_a = document.createElement("button")
                    button_b = document.createElement("button")
                    button_c = document.createElement("button")
                    label.innerText = question[0]
                    button_a.innerText = question[1]
                    button_b.innerText = question[2]
                    button_c.innerText = question[3]
                    label.className = "u"
                    button_a.className = "u"
                    button_b.className = "u"
                    button_c.className = "u"
                    button_a.type = "button"
                    button_b.type = "button"
                    button_c.type = "button"
                    button_a.value = "0"
                    button_b.value = "1"
                    button_c.value = "2"
                    form.appendChild(label)
                    form.appendChild(br)
                    form.appendChild(button_a)
                    form.appendChild(button_b)
                    form.appendChild(button_c)
                    document.body.appendChild(form)
                    done = false
                    buttons = [button_a, button_b, button_c]
                    buttons.forEach((button, idx) => {
                        button.addEventListener("click", () => {
                            if (!done) {
                                answer = parseInt(button.value)
                                ev = new Event("submit", {})
                                form.dispatchEvent(ev)
                            }
                        })
                    })
                    form.addEventListener("submit", (ev) => {
                        done = true
                        correct = answer == question[4]
                        if (correct) {
                            buttons[answer].style.animation = "0.5s correct 0s forwards"
                            score++
                        }
                        else {
                            buttons[answer].style.animation = "0.5s wrong 0s forwards"
                        }
                        setTimeout(() => {
                            form.style.animation = "0.5s fadeout 0s forwards"
                            setTimeout(() => {
                                form.remove()
                                resolve()
                            }, 500)
                        }, 2000)
                    })
                })
            }
            function main(init_button) {
                init_button.style.animation = "0.5s fadeout 0s forwards"
                setTimeout(async () => {
                    init_button.remove()
                    for (const question of questions) {
                        await ask(question)
                    }
                    const display = document.createElement("label")
                    const restart = document.createElement("button")
                    display.innerText = `${score}/${questions.length}`
                    restart.innerText = "↻"
                    display.id = "display"
                    restart.id = "restart"
                    display.className = "u"
                    restart.className = "u"
                    restart.style.animation += ", 0.5s fadein 0s forwards"
                    restart.addEventListener("click", (ev) => {
                        ev.preventDefault()
                        display.style.animation = "0.5s fadeout 0s forwards"
                        setTimeout(() => {
                            score = 0
                            display.remove()
                        }, 500)
                        main(restart)
                    })
                    document.body.appendChild(display)
                    document.body.appendChild(restart)
                }, 500)
            }
            document.addEventListener("DOMContentLoaded", (ev) => {
                ev.preventDefault()
                document.title = `\"${today.title} ${date.getFullYear().toString()}.\" - ${document.title}`
                document.getElementsByTagName("footer")[0].innerText = `© ${date.getFullYear()} Omer Drkić. All Rights Reserved.`
                document.getElementsByTagName("h1")[0].innerText = `${today.title} ${date.getFullYear().toString()}.`
                document.getElementById("bg").style.backgroundImage = `url(\"/bgs/${today.title}.jpg\")`
                document.getElementById("bg").style.backgroundRepeat = "no-repeat"
                document.getElementById("bg").style.backgroundSize = "cover"
            })
            start.addEventListener("click", (ev) => {
                ev.preventDefault()
                main(start)
            })
        </script>
    </body>
</html>
